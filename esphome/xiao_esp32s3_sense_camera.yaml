substitutions:
  devicename: minicam-esp32
  friendly_name: MiniCam ESP32

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# Required for esp32_camera on ESPHome 2026.x
psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

# Camera (XIAO ESP32S3 Sense)
esp32_camera:
  id: cam
  name: "${friendly_name}"
  external_clock:
    pin: GPIO10
    frequency: 20MHz
  i2c_pins:
    sda: GPIO40
    scl: GPIO39
  data_pins: [GPIO15, GPIO17, GPIO18, GPIO16, GPIO14, GPIO12, GPIO11, GPIO48]
  vsync_pin: GPIO38
  href_pin: GPIO47
  pixel_clock_pin: GPIO13

  # Stable baseline
  resolution: 640x480
  jpeg_quality: 12
  max_framerate: 10 fps

esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

# Nice-to-have diagnostics
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "${friendly_name} Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"

# Optional (recommended): quick recovery button in HA
button:
  - platform: restart
    name: "${friendly_name} Restart"
