substitutions:
  devicename: xiao-esp32s3-sense-cam
  friendly_name: XIAO ESP32S3 Sense Cam

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  platformio_options:
    # Nécessaire pour la caméra (PSRAM) selon l'exemple Seeed
    build_flags: -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio

esp32:
  # L'exemple officiel Seeed pour la caméra utilise esp32-s3-devkitc-1
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:

api:
  # Si tu utilises une clé de chiffrement ESPHome, décommente :
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: "changeme123"

captive_portal:

# --- Caméra (OV2640/OV3660 sur la Sense) ---
# Pins tirées du Wiki Seeed "XIAO ESP32S3 ESPHome" (camera section)
# Ajuste la résolution si tu veux plus léger (ex: 640x480) ou plus fort si stable.
esp32_camera:
  id: cam
  name: "${friendly_name}"
  external_clock:
    pin: GPIO10
    frequency: 20MHz
  i2c_pins:
    sda: GPIO40
    scl: GPIO39
  data_pins: [GPIO15, GPIO17, GPIO18, GPIO16, GPIO14, GPIO12, GPIO11, GPIO48]
  vsync_pin: GPIO38
  href_pin: GPIO47
  pixel_clock_pin: GPIO13
  resolution: 800x600

# Stream + snapshot HTTP (pratique pour debug)
esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

# (Optionnel) petit capteur uptime + RSSI
sensor:
  - platform: uptime
    name: "${friendly_name} Uptime"
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"
